services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - redis
    volumes:
      # Mount source for live code reload
      - ./backend:/app
      # Keep the uv venv inside the container, don't overwrite with host
      - backend_venv:/app/.venv
    environment:
      SECRET_KEY: django-insecure-dev-only-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DATABASE_URL: sqlite:////app/db.sqlite3
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POPULATE_DB: ${POPULATE_DB:-false}
    command: >
      sh -c "uv sync --frozen &&
             uv run python manage.py migrate --noinput &&
             uv run python manage.py collectstatic --noinput --clear &&
             { [ \"$$POPULATE_DB\" != \"true\" ] || uv run python manage.py populate_db; } &&
             uv run daphne -b 0.0.0.0 -p 8000 conf.asgi:application"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      # Mount source for hot-module reload
      - ./frontend:/app
      # Keep node_modules inside the container, don't overwrite with host
      - frontend_modules:/app/node_modules
    environment:
      # Empty = same-origin through nginx, no URL config needed
      NEXT_PUBLIC_API_URL: ""
      NEXT_PUBLIC_WS_URL: "ws://localhost"
      # Used server-side (SSR/Server Components) to reach backend directly
      BACKEND_INTERNAL_URL: "http://backend:8000"
    command: sh -c "npm install && npm run dev"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
  backend_venv:
  frontend_modules:
