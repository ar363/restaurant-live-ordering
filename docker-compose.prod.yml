services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      - redis
    volumes:
      - sqlite_data:/app/db
      - media_data:/app/media
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set for production}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: sqlite:////app/db/db.sqlite3
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run daphne -b 0.0.0.0 -p 8000 conf.asgi:application"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ""
    restart: always
    depends_on:
      - backend
    environment:
      # Empty = same-origin through nginx, no URL config needed
      NEXT_PUBLIC_API_URL: ""
      # Used server-side (SSR/Server Components) to reach backend directly
      BACKEND_INTERNAL_URL: "http://backend:8000"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro

volumes:
  redis_data:
  sqlite_data:
  media_data:
